apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: wanderlust
type: Opaque
stringData:
  MONGODB_URI: "mongodb://mongo-service/wanderlust"
  REDIS_URL: "redis://redis-service:6379"
  PORT: "8080"
  FRONTEND_URL: "http://frontend-service:5173"
  ACCESS_COOKIE_MAXAGE: "120000"
  ACCESS_TOKEN_EXPIRES_IN: "120s"
  REFRESH_COOKIE_MAXAGE: "120000"
  REFRESH_TOKEN_EXPIRES_IN: "120s"
  JWT_SECRET: "70dd8b38486eee723ce2505f6db06f1ee503fde5eb06fc04687191a0ed665f3f98776902d2c89f6b993b1c579a87fedaf584c693a106f7cbf16e8b4e67e9d6df"
  NODE_ENV: "Development"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: wanderlust
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: backend
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: hetgajera01/wanderlust-backend:31

          envFrom:
           - secretRef:
              name: backend-secret
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: wanderlust
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      nodePort: 31100
