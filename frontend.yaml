apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: wanderlust
type: Opaque
stringData:
  VITE_API_PATH: "http://backend-service:8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: wanderlust
  labels:
    app: frontend
  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      name: frontend
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: hetgajera01/wanderlust-frontend:31
          ports:
            -  containerPort: 5173
---
apiVersion: v1 
kind: Service
metadata:
  name: frontend-service
  namespace: wanderlust
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 5173
      protocol: TCP
      nodePort: 31000